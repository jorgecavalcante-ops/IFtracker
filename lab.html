<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabTrack Pro - Setores</title>
    
    <!-- Custom Assets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @tailwind base;
        @tailwind components;
        @tailwind utilities;

        :root {
            --sidebar-width: 260px;
            --accent-blue: #3b82f6;
            --bg-base: #09090b;
            --bg-sidebar: #121214;
            --bg-card: #18181b;
            --border-dim: #27272a;
            --text-muted: #71717a;
            --text-dim: #a1a1aa;
        }

        @layer base {
            body {
                @apply bg-[#09090b] text-[#e4e4e7] antialiased;
                font-family: 'Inter', sans-serif;
            }
        }

        @layer components {
            .sidebar {
                @apply bg-[#121214] border-r border-[#27272a] h-screen fixed left-0 top-0 z-50 transition-transform duration-300;
                width: var(--sidebar-width);
            }

            .sidebar-overlay {
                @apply fixed inset-0 bg-black/60 z-40 md:hidden backdrop-blur-sm transition-opacity duration-300;
            }

            .main-content {
                @apply min-h-screen transition-[padding] duration-300 w-full;
            }

            .main-content-shifted {
                @apply md:pl-[260px];
            }

            .nav-item {
                @apply px-6 py-2.5 flex items-center gap-3 text-sm font-medium text-[#a1a1aa] transition-all border-l-4 border-transparent hover:text-white hover:bg-[#1a1a1c];
            }

            .nav-item.active {
                @apply text-white bg-[#1e1e21] border-blue-500;
            }

            .lab-hero-card {
                @apply bg-[#18181b] border border-[#27272a] p-6 rounded-xl transition-all duration-300 hover:border-blue-500/50 hover:shadow-lg hover:shadow-blue-500/5;
            }

            .eq-card {
                @apply p-5 bg-[#0c0c0e] border border-[#27272a] rounded-xl transition-all duration-200 hover:bg-[#161619] hover:border-[#3f3f46];
            }

            .icon-box {
                @apply h-10 w-10 rounded-lg border border-blue-500/20 bg-blue-500/5 flex items-center justify-center transition-all duration-300;
            }

            .icon-box-sm {
                @apply h-8 w-8 rounded bg-blue-500/10 flex items-center justify-center;
            }

            .accent-badge {
                @apply flex items-center gap-2 px-4 py-1.5 bg-zinc-900 rounded-full border border-zinc-800 shadow-inner shadow-black/20;
            }

            .accent-badge i {
                @apply w-3.5 h-3.5 text-zinc-500;
            }

            .accent-badge span {
                @apply text-[11px] font-medium text-zinc-400;
            }

            .meta-box {
                @apply bg-[#18181b] p-5 rounded-xl border border-[#27272a] shadow-sm;
            }

            .meta-label {
                @apply text-[10px] uppercase text-[#71717a] font-bold tracking-widest mb-1;
            }

            .status-pill {
                @apply px-2.5 py-1 rounded-md text-[10px] font-bold uppercase;
            }

            .line-clamp-2 {
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }

            main#main-content header#main-header button#sidebar-toggle {
                @apply active:scale-95 hover:bg-zinc-800 hover:border-zinc-700 transition-all cursor-pointer;
            }

            nav#sidebar-nav > div {
                @apply flex flex-col h-full overflow-y-auto;
            }

            nav#sidebar-nav {
                @apply shadow-2xl;
            }

            .header-badge {
                @apply min-w-[100px] justify-center font-mono shadow-inner shadow-black/20;
            }
        }

        [x-cloak] {
            display: none !important;
        }

        ::-webkit-scrollbar {
            @apply w-1.5;
        }

        ::-webkit-scrollbar-track {
            @apply bg-transparent;
        }

        ::-webkit-scrollbar-thumb {
            @apply bg-[#27272a] rounded-full hover:bg-[#3f3f46];
        }
    </style>
</head>
<body class="flex min-h-screen bg-[#09090b]">
    <!-- Mobile Sidebar Overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

    <!-- Navigation Sidebar -->
    <nav id="sidebar-nav" class="sidebar -translate-x-full">
        <div class="p-8 pb-4">
            <div class="flex items-center gap-3 mb-12">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i data-lucide="microscope" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black text-white leading-none tracking-tighter uppercase">IFtracker</h1>
                </div>
            </div>

            <div class="space-y-1">
                <h3 class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest px-4 mb-4">Principais</h3>
                <a href="index.html" class="nav-item">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                    <span>Dashboard</span>
                </a>
            </div>

            <div class="mt-10 space-y-1">
                <h3 class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest px-4 mb-4">Setores</h3>
                <div id="sidebar-labs-items">
                    <!-- Gerado via JS -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="main-content flex-1 flex flex-col">
        <header id="main-header" class="h-20 border-b border-zinc-800 flex items-center justify-between px-4 sm:px-8 bg-zinc-950/50 backdrop-blur-md sticky top-0 z-40">
            <div class="flex items-center gap-3 sm:gap-4 overflow-hidden">
                <button id="sidebar-toggle" class="text-zinc-400 hover:text-white transition-colors bg-zinc-900 p-2 rounded-lg border border-zinc-800 shrink-0">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <div class="h-4 w-[1px] bg-zinc-800 mx-1 sm:mx-2 shrink-0"></div>
                <div class="flex items-center gap-2 overflow-hidden">
                    <i id="lab-icon-header" class="w-4 h-4 text-blue-500 shrink-0"></i>
                    <span id="lab-name-header" class="text-sm font-bold text-white truncate"></span>
                </div>
            </div>
            
            <div class="flex items-center gap-4 shrink-0">
                <div class="hidden md:flex accent-badge">
                    <i data-lucide="clock"></i>
                    <span id="current-date-display"></span>
                </div>
                <a href="index.html" class="text-[10px] sm:text-xs font-bold text-zinc-500 hover:text-white uppercase tracking-widest flex items-center gap-2 transition-colors shrink-0">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> <span class="hidden sm:inline">Voltar</span>
                </a>
            </div>
        </header>

        <div id="page-content" class="p-4 sm:p-8 max-w-[1600px] mx-auto w-full">
            <!-- Sub-Dashboard: Lab specific stats -->
            <div id="lab-stats" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-12">
                <div class="p-5 bg-zinc-900/40 border border-zinc-800 rounded-2xl">
                    <div class="text-[10px] font-bold text-blue-500 uppercase tracking-widest mb-1">Itens</div>
                    <div id="lab-items-count-stat" class="text-2xl font-black text-white">0</div>
                </div>
                <div class="p-5 bg-zinc-900/40 border border-zinc-800 rounded-2xl">
                    <div class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-1">Status</div>
                    <div class="text-xs font-bold text-zinc-300">Inventário Verificado</div>
                </div>
                <div class="p-5 bg-zinc-900/40 border border-zinc-800 rounded-2xl">
                    <div class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1">ID Setor</div>
                    <div id="lab-id-display" class="text-xs font-mono text-zinc-300"></div>
                </div>
                <div class="p-5 bg-zinc-900/40 border border-zinc-800 rounded-2xl">
                    <div class="text-[10px] font-bold text-purple-500 uppercase tracking-widest mb-1">Update</div>
                    <div class="text-xs font-bold text-zinc-300">Hoje</div>
                </div>
            </div>

            <!-- Lab Info & Search -->
            <div id="lab-header-section" class="mb-12 flex flex-col lg:flex-row lg:items-center justify-between gap-8">
                <div class="space-y-4">
                    <div class="flex flex-wrap items-center gap-3">
                        <span class="status-pill bg-emerald-500/10 text-emerald-500 border border-emerald-500/20">Inventário Ativo</span>
                        <div class="h-4 w-[1px] bg-zinc-800"></div>
                        <span id="items-count-display" class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest"></span>
                    </div>
                    <h2 id="lab-name-display" class="text-3xl md:text-4xl font-black text-white tracking-tighter"></h2>
                    <p id="lab-description-display" class="text-zinc-400 text-sm md:text-base max-w-3xl leading-relaxed"></p>
                </div>
                
                <div class="relative w-full lg:w-96 group">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500 group-focus-within:text-blue-500 transition-colors"></i>
                    <input id="lab-item-search"
                           type="text" 
                           placeholder="Filtrar por nome, marca ou modelo..." 
                           class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl py-3.5 pl-12 pr-4 text-sm focus:outline-none focus:border-blue-500 transition-all shadow-lg focus:shadow-blue-500/5">
                </div>
            </div>

            <!-- Items Grid -->
            <div id="items-grid-container" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
                <!-- Gerado via JS -->
            </div>
        </div>
    </main>

    <script type="module" src="src/lab.js"></script>
</body>
</html>
